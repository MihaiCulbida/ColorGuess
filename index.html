<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500;0,800;0,900;1,800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <title>ColorMatch</title>
</head>
<body>
    <div class="card">
        <div class="card-top">
            <h1 class="title">color</h1>
            <div class="description-block">
                <p class="description">A color appears. You name it.</p>
                <p class="description secondary">Most people are worse at this than they think. Five <br> rounds to prove otherwise.</p>
                <p class="description game-mode-hint">Set the number of attempts anywhere <br> from 1 to 10 or go limitless and play until <br> you decide to stop.</p>
            </div>
        </div>

        <div class="card-footer">
            <div class="game-mode-circle" id="gameModeBtn">
              <img src="img/mode.png" alt="Game mode">
            </div>

            <div class="game-mode-popup" id="gameModePopup">
              <div class="popup-row">
                <span class="popup-label">Attempts</span>
                <span class="popup-value" id="attemptsValue">5</span>
              </div>
              <input type="range" class="attempts-slider" id="attemptsSlider" min="1" max="10" value="5">
              <label class="no-limits-row">
                <span>No limits</span>
                <div class="custom-checkbox" id="noLimitsCheck"></div>
              </label>
            </div>

            <div class="difficulty">
                <div class="difficulty-track" id="difficultyTrack">
                    <div class="difficulty-thumb" id="difficultyThumb"></div>
                    <div class="difficulty-dot" data-index="0"></div>
                    <div class="difficulty-dot" data-index="1"></div>
                    <div class="difficulty-dot" data-index="2"></div>
                </div>
                <span class="difficulty-label" id="difficultyLabel">Easy</span>
            </div>

            <div class="footer-right">
                <button class="arrow-btn" id="startBtn">
                    <img src="img/arroww.png" alt="Start">
                </button>
            </div>
        </div>
      <div id="gameOverlay" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; border-radius:20px; overflow:hidden;">
        <span id="countdownWord" class="countdown-word"></span>
      <div class="corner-timer" id="cornerTimer" style="display:none;">
        <span class="seconds" id="timerSeconds">5</span>
        <span class="millis" id="timerMillis">00</span>
      </div>
        <span class="round-counter" id="roundCounter"></span>
      </div>
    </div>

    <script src="src/script.js"></script>
</body>
</html>
