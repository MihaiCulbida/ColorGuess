<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,500;0,800;0,900;1,800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="icon" type="image" href="img/logo.png">
    <title>ColorMatch</title>
</head>
<body>
    <nav class="navbar">
        <span class="nav-title">ColorMatch</span>
        <div class="nav-right">
            <button class="nav-btn" id="helpBtn">
                <img src="img/help.png" alt="Help">
            </button>
            <button class="nav-btn" id="themeBtn">
                <img src="img/dark.png" alt="Theme" id="themeIcon">
            </button>
        </div>
    </nav>
    <div class="card">
        <div class="card-top">
            <h1 class="title">color</h1>
            <div class="description-block">
                <p class="description">A color appears. You name it.</p>
                <p class="description secondary">Most people can't remember colors anymore.<br>See how good (or bad) you are at it.</p>
                <p class="description game-mode-hint">Set the number of attempts anywhere  from 1 to 10 <br> or go limitless and play until you decide to stop.</p>
            </div>
            <div class="hint-bar" id="hintBar"></div>
            <div class="training-preview" id="trainingPreview" style="display:none; flex:1; border-radius:12px;"></div>
        </div>
        <div class="card-footer">
            <div class="game-mode-circle" id="gameModeBtn">
                <img src="img/mode.png" alt="Game mode">
            </div>
            <div class="training-circle" id="trainingBtn">
                <img src="img/training.png" alt="Training">
            </div>
            <div class="difficulty">
                <div class="difficulty-track" id="difficultyTrack">
                    <div class="difficulty-thumb" id="difficultyThumb"></div>
                    <div class="difficulty-dot"></div>
                    <div class="difficulty-dot"></div>
                    <div class="difficulty-dot"></div>
                </div>
                <span class="difficulty-label" id="difficultyLabel">Easy</span>
            </div>
            <div class="footer-right">
                <button class="arrow-btn" id="startBtn">
                    <img src="img/arrow.png" alt="Start">
                </button>
            </div>
        </div>

        <div id="gameOverlay" style="display:none; position:absolute; inset:0;">
            <span id="countdownWord" class="countdown-word" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"></span>
            <div class="corner-timer" id="cornerTimer" style="display:none;">
                <span class="seconds" id="timerSeconds">5</span>
                <span class="millis" id="timerMillis">00</span>
            </div>
            <span class="round-counter" id="roundCounter"></span>

            <div class="hsl-panel" id="hslPanel" style="display:none; opacity:0;">
                <div class="slider-wrap">
                    <div class="track-clip"><div class="track-bg" id="hBg"></div></div>
                    <input class="vr" type="range" id="hS" min="0" max="359" value="180" step="1">
                    <div class="custom-thumb" id="hThumb"></div>
                </div>
                <div class="slider-wrap">
                    <div class="track-clip"><div class="track-bg" id="sBg"></div></div>
                    <input class="vr" type="range" id="sS" min="0" max="100" value="60" step="1">
                    <div class="custom-thumb" id="sThumb"></div>
                </div>
                <div class="slider-wrap">
                    <div class="track-clip"><div class="track-bg" id="lBg"></div></div>
                    <input class="vr" type="range" id="lS" min="0" max="100" value="50" step="1">
                    <div class="custom-thumb" id="lThumb"></div>
                </div>
                <div class="panel-right"></div>
            </div>
            <button class="toggle-view-btn" id="toggleViewBtn" style="display:none;">
              <img src="img/despit.png" alt="Toggle">
            </button>
            <button class="submit-btn" id="submitBtn" style="display:none;">
              <img src="img/submit.png" alt="Submit">
            </button>
            <div class="result-panel" id="resultPanel" style="display:none; opacity:0;">
                <div class="result-half result-top" id="resultGuessColor">
                    <div class="result-score-block">
                        <span class="result-score" id="resultScore">0</span>
                        <span class="result-phrase" id="resultScorePhrase"></span>
                    </div>
                    <div class="result-color-info result-color-info--top">
                        <span class="result-color-sublabel">Your selection</span>
                        <span class="result-color-values" id="resultGuessLabel"></span>
                    </div>
                </div>
                <div class="result-half result-bottom" id="resultOriginalColor">
                    <div class="result-color-info result-color-info--bottom">
                        <span class="result-color-sublabel">Original</span>
                        <span class="result-color-values" id="resultOriginalLabel"></span>
                    </div>
                    <button class="result-next-btn" id="resultNextBtn">
                        <img src="img/arrow.png" alt="Next">
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="game-mode-popup" id="gameModePopup">
        <div class="popup-row">
            <span class="popup-label">Attempts</span>
            <span class="popup-value" id="attemptsValue">5</span>
        </div>
        <input type="range" class="attempts-slider" id="attemptsSlider" min="1" max="10" value="5">
        <label class="no-limits-row">
            <span>No limits</span>
            <div class="custom-checkbox" id="noLimitsCheck"></div>
        </label>
    </div>

    <script src="src/script.js"></script>
</body>
</html>
